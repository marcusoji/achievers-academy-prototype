    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        /* Premium Smartphone Simulation Wrapper */
        .phone-container {
            width: 375px;
            height: 812px;
            border: 12px solid #064e3b;
            border-radius: 40px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background: #ffffff;
            overflow: hidden;
        }
        .phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 24px;
            background: #064e3b;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 50;
        }
    </style>

        function calculateGrade(total) {
            if (total >= 70) return 'A (Excellent)';
            if (total >= 60) return 'B (Very Good)';
            if (total >= 50) return 'C (Credit)';
            if (total >= 40) return 'P (Pass)';
            return 'F (Fail)';
        }

        function showToast(text) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = "p-3.5 rounded-xl shadow-xl text-xs font-semibold bg-emerald-900 text-white border border-emerald-700 flex items-center gap-2.5 animate-fade-in";
            toast.innerHTML = `<i class="fa-solid fa-circle-check text-emerald-400"></i> <span>${text}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        function quickFill(email) { document.getElementById('identity').value = email; showToast(`Active Context: ${email}`); }

        function handleAuth(event) {
            event.preventDefault();
            const email = document.getElementById('identity').value.trim();
            if (AppState.stakeholders[email]) {
                AppState.activeUser = AppState.stakeholders[email];
                AppState.problemsTrackerOpen = false;
                AppState.activeTab = 'dashboard';
                document.getElementById('login-screen').classList.add('hidden');
                renderAppFramework();
            } else { alert("Account node context mismatch."); }
        }

        function terminateSession() {
            AppState.activeUser = null;
            document.getElementById('workspace-mount-surface').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

                { id: 'communication', label: 'Notices', icon: 'fa-bell', allow: ['student', 'parent', 'teacher'] }

            tabs.forEach(t => {
                if(t.allow.includes(role)) {
                    const btn = document.createElement('button');
                    btn.className = `flex flex-col items-center gap-0.5 flex-1 py-1 text-[10px] font-bold transition ${AppState.activeTab === t.id && !AppState.problemsTrackerOpen ? 'text-emerald-600' : 'text-slate-400 hover:text-slate-600'}`;

                        AppState.problemsTrackerOpen = false;
                        AppState.activeTab = t.id;
                        renderMobileTabs();
                        triggerWorkspaceNavigation();
                    };
                    btn.innerHTML = `<i class="fa-solid ${t.icon} text-sm"></i> <span>${t.label}</span>`;

                }
            });

                    typingFormHtml = `
                        <div class="bg-amber-50 border border-amber-200 p-3.5 rounded-xl text-xs font-semibold text-amber-900 mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-triangle-exclamation text-amber-600 text-sm"></i>
                            <div><strong>Principal Control Isolation Block:</strong> Your role has authentication clearance validation rights. Typing capabilities have been delegated to active Class Teachers.</div>
                        </div>`;
                }

                mount.innerHTML = `
                    <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm max-w-xl space-y-4 animate-fade-in">
                        <div>
                            <h2 class="font-bold text-lg text-slate-900">CBT Core Examination System Configuration Engine</h2>
                            <p class="text-xs text-slate-400">Manage deployment validation matrices down to active exam nodes.</p>
                        </div>
                        
                        ${typingFormHtml}

                        <div class="space-y-2">
                            <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wider">Operational Audit & Approval Logs Queue</h3>
                            <div class="space-y-2 max-h-[260px] overflow-y-auto pr-1 custom-scrollbar">${approvalQueueHtml}</div>
                        </div>
                    </div>`;
            }
        }

        function verifyQuestionStatus(qId, statusBoolean) {
            let q = AppState.cbtQuestions.find(item => item.id === qId);
            if (q) {
                if (statusBoolean) {
                    q.approved = true;
                    showToast("Question parameters approved for deployment pipeline.");
                } else {
                    AppState.cbtQuestions = AppState.cbtQuestions.filter(item => item.id !== qId);
                    showToast("Question parameter rejected and stripped from queue array.");
                }
                renderCbtPortalView(isMobileRole() ? document.getElementById('mobile-payload-mount') : document.getElementById('desktop-payload-mount'));
            }
        }

        function saveCbtChoice(qId, oIdx) { AppState.userCbtAnswers[qId] = oIdx; }
        function submitMobileCbtExam() {
            AppState.students[4].cbtScore = 30; 
            persistToMemory();
            showToast("CBT score compiled successfully.");
            renderCbtPortalView(document.getElementById('mobile-payload-mount'));
        }
        function handleCreateCbt(e) {
            e.preventDefault();
            const text = document.getElementById('cbt-text').value;
            const options = [document.getElementById('cbt-o0').value, document.getElementById('cbt-o1').value, document.getElementById('cbt-o2').value, document.getElementById('cbt-o3').value];
            const correct = parseInt(document.getElementById('cbt-correct').value);
            
            const autoApprove = AppState.activeUser.role === 'admin';
            
            AppState.cbtQuestions.push({ id: Date.now(), text: text, options: options, correct: correct, approved: autoApprove });
            showToast(autoApprove ? "Question payload injected and live." : "Question submitted to Principal verification stack queue.");
            e.target.reset();
            renderCbtPortalView(isMobileRole() ? document.getElementById('mobile-payload-mount') : document.getElementById('desktop-payload-mount'));
        }

        function renderAcademicsPortal(mount) {
            let fields = AppState.students.filter(s => s.class === "SS2").map(s => {
                let total = s.ca1 + s.ca2 + s.exam;
                return `
                    <div class="p-3.5 bg-white border border-slate-100 rounded-xl space-y-2 shadow-sm text-xs">
                        <div class="font-bold text-slate-900 flex justify-between"><span>${s.name}</span> <span class="font-mono text-slate-400">${s.id}</span></div>
                        <div class="grid grid-cols-3 gap-2 text-center text-[11px]">
                            <div><span class="text-[9px] block text-slate-400 font-bold mb-0.5">1st CA (15)</span><input type="number" max="15" value="${s.ca1}" onchange="updateScore('${s.id}', 'ca1', this.value)" class="w-full p-1.5 border rounded-lg text-center bg-slate-50 font-bold outline-none ring-1 ring-slate-200"></div>
                            <div><span class="text-[9px] block text-slate-400 font-bold mb-0.5">2nd CA (15)</span><input type="number" max="15" value="${s.ca2}" onchange="updateScore('${s.id}', 'ca2', this.value)" class="w-full p-1.5 border rounded-lg text-center bg-slate-50 font-bold outline-none ring-1 ring-slate-200"></div>
                            <div><span class="text-[9px] block text-slate-400 font-bold mb-0.5">Exam (70)</span><input type="number" max="70" value="${s.exam}" onchange="updateScore('${s.id}', 'exam', this.value)" class="w-full p-1.5 border rounded-lg text-center bg-slate-50 font-bold outline-none ring-1 ring-slate-200"></div>
                        </div>
                        <div class="flex justify-between items-center text-[11px] font-bold bg-emerald-50 text-emerald-900 p-2 rounded-xl border border-emerald-100">
                            <span>Computed Assessment Aggregate:</span>
                            <span class="font-extrabold" id="m-tot-${s.id}">${total} / 100 — ${calculateGrade(total)}</span>
                        </div>
                    </div>`;
            }).join('');

            mount.innerHTML = `
                <div class="animate-fade-in space-y-3">
                    <div><h2 class="text-sm font-bold text-slate-900">Term Grades Assessment Sheets</h2><p class="text-[11px] text-slate-500">Subject Stream Mapping: <strong>Mathematics (SS2 Block Stream)</strong></p></div>
                    <div class="space-y-2 max-h-[440px] overflow-y-auto pr-0.5 custom-scrollbar">${fields}</div>
                    <button onclick="showToast('Grades successfully compiled and synchronized.'); persistToMemory();" class="w-full py-2.5 bg-emerald-600 text-white font-bold rounded-xl text-xs mt-2 shadow">Save Marks Parameters</button>
                </div>`;
        }

        function updateScore(id, vector, value) {
            let s = AppState.students.find(stud => stud.id === id);
            if(s) {
                s[vector] = parseInt(value) || 0;
                let total = s.ca1 + s.ca2 + s.exam;
                const element = document.getElementById(`m-tot-${id}`);
                if (element) element.innerText = `${total} / 100 — ${calculateGrade(total)}`;
            }
        }

        function renderStudentResultsView(mount) {
            let target = AppState.students[4];
            let total = target.ca1 + target.ca2 + target.exam;

            mount.innerHTML = `
                <div class="animate-fade-in space-y-4">
                    <div><h2 class="text-sm font-bold text-slate-900">Official Terminal Performance Card</h2><p class="text-[11px] text-slate-500">Active Profile Stream Target: <strong>${target.name}</strong></p></div>
                    <div class="bg-white border border-slate-100 rounded-xl p-4 text-xs space-y-3 shadow-sm">
                        <div class="flex justify-between border-b pb-1.5 font-bold text-slate-400 text-[10px] uppercase"><span>Assessment Area Subject</span><span>Allocated Score Metrics</span></div>
                        <div class="flex justify-between"><span>Continuous Assessment 1 (Test Block)</span><span class="font-bold text-slate-900">${target.ca1} / 15 Marks</span></div>
                        <div class="flex justify-between"><span>Continuous Assessment 2 (Project Block)</span><span class="font-bold text-slate-900">${target.ca2} / 15 Marks</span></div>
                        <div class="flex justify-between"><span>Final Terminal Exam Examination Sheet</span><span class="font-bold text-slate-900">${target.exam} / 70 Marks</span></div>
                        <div class="flex justify-between border-t border-emerald-100 pt-3 font-bold text-slate-900 text-[12px] bg-emerald-50/50 p-2.5 rounded-xl">
                            <span>Cumulative Average Grade:</span>
                            <span class="text-emerald-700 font-extrabold">${total}% — ${calculateGrade(total)}</span>
                        </div>
                    </div>
                </div>`;
        }

        function renderCommunicationPortal(mount) {
            let alerts = AppState.communications.map(c => `
                <div class="p-3.5 bg-white border border-slate-100 rounded-xl text-xs space-y-1 shadow-sm">
                    <div class="text-[9px] text-emerald-700 font-bold">Issued by: ${c.sender} | ${c.date}</div>
                    <h4 class="font-bold text-slate-900">${c.title}</h4>
                    <p class="text-slate-500 font-medium text-[11px] leading-relaxed">${c.body}</p>
                </div>`).join('');

            if(isMobileRole()) {
                mount.innerHTML = `<div class="animate-fade-in space-y-2.5"><div><h2 class="text-sm font-bold text-slate-900">Broadcast Announcement Channel Feed</h2></div>${alerts}</div>`;
            } else {
                mount.innerHTML = `
                    <div class="animate-fade-in space-y-4 max-w-xl">
                        <div><h2 class="text-lg font-bold text-slate-900">Broadcast System Engine Infrastructure</h2><p class="text-xs text-slate-500">Disseminate notification matrices directly down to parent and student app client view layers.</p></div>
                        <form onsubmit="handleNewBroadcast(event);" class="bg-white border border-slate-200 p-5 rounded-xl shadow-sm space-y-3">
                            <div><label class="block text-xs font-bold mb-1 text-slate-600">Notice Broadcast Title</label><input id="bc-title" type="text" required placeholder="e.g. Resumption Guidelines Matrix" class="w-full text-xs p-2.5 border rounded-xl bg-slate-50 outline-none ring-1 ring-slate-100"></div>
                            <div><label class="block text-xs font-bold mb-1 text-slate-600">Message Content Parameter Payload</label><textarea id="bc-body" rows="3" required placeholder="Type parameters to push downstream..." class="w-full text-xs p-2.5 border rounded-xl bg-slate-50 outline-none ring-1 ring-slate-100"></textarea></div>
                            <button class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs rounded-xl transition shadow">Dispatch Immediate System Broadcast</button>
                        </form>
                    </div>`;
            }
        }

        function handleNewBroadcast(e) {
            e.preventDefault();
            AppState.communications.unshift({ id: Date.now(), title: document.getElementById('bc-title').value, body: document.getElementById('bc-body').value, date: "Today", sender: AppState.activeUser.name });
            showToast("System notification dispatched.");
            renderCommunicationPortal(document.getElementById('desktop-payload-mount'));
        }

        function renderRegistrationForms(mount) {
            mount.innerHTML = `
                <div class="bg-white border border-slate-200 p-6 rounded-xl text-xs max-w-md shadow-sm animate-fade-in">
                    <h2 class="font-bold mb-1 text-sm text-slate-900">Digital Registry Admissions Forms Matrix</h2>
                    <p class="text-xs text-slate-400 mb-4">Onboard student entities directly into system runtime arrays.</p>
                    <form id="new-student-form" onsubmit="handleRegisterStudent(event);" class="space-y-3">
                        <div><label class="block text-xs font-bold mb-1 text-slate-600">Student Legal Full Name</label><input id="reg-name" type="text" required placeholder="Legal Name e.g. Aminu Yusuf" class="w-full p-2.5 border rounded-xl bg-slate-50 outline-none ring-1 ring-slate-100"></div>
                        <div><label class="block text-xs font-bold mb-1 text-slate-600">Assigned Class Stream Group</label><select id="reg-class" class="w-full p-2.5 border rounded-xl bg-slate-50 outline-none ring-1 ring-slate-100"><option>JS1</option><option>JS2</option><option>JS3</option><option>SS1</option><option selected>SS2</option><option>SS3</option></select></div>
                        <div><label class="block text-xs font-bold mb-1 text-slate-600">Allocated Tuition Bill Fee (₦)</label><input id="reg-fees" type="number" required value="120000" class="w-full p-2.5 border rounded-xl bg-slate-50 outline-none ring-1 ring-slate-100"></div>
                        <button type="submit" class="w-full py-2.5 bg-emerald-600 text-white font-bold rounded-xl shadow mt-2">Commit Record File</button>
                    </form>
                </div>`;
        }

        function handleRegisterStudent(event) {
            event.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const cls = document.getElementById('reg-class').value;
            const bill = parseInt(document.getElementById('reg-fees').value) || 0;
            AppState.students.unshift({ id: `AA/2026/${Math.floor(100+Math.random()*899)}`, name: name, class: cls, status: "Active", feesPaid: 0, balance: bill, attendance: 100, history: ["P","P","P","P","P"], ca1: 0, ca2: 0, exam: 0, cbtScore: null });
            persistToMemory();
            showToast(`Registered: ${name}`);
            document.getElementById('new-student-form').reset();
        }

        function renderStudentsRoster(mount) {
            let rows = AppState.students.map(s => `
                <tr class="border-b text-xs border-slate-100 hover:bg-slate-50/50">
                    <td class="py-3 px-3 font-mono font-bold text-slate-500">${s.id}</td>
                    <td class="py-3 px-3 font-bold text-slate-900">${s.name}</td>
                    <td class="py-3 px-3 text-center"><span class="bg-emerald-50 text-emerald-800 font-bold text-[10px] px-2 py-0.5 rounded border border-emerald-100">${s.class}</span></td>
                    <td class="py-3 px-3">
                        <div class="flex items-center gap-2">
                            <div class="w-32 bg-slate-100 h-2 rounded-full overflow-hidden"><div class="bg-emerald-500 h-full" style="width: ${s.attendance}%"></div></div>
                            <span class="font-bold text-[10px] text-slate-500">${s.attendance}%</span>
                        </div>
                    </td>
                </tr>`).join('');
                
            mount.innerHTML = `
                <div class="bg-white border border-slate-200 p-5 rounded-xl shadow-sm animate-fade-in max-w-4xl">
                    <h2 class="font-bold text-sm text-slate-900 mb-4">Student Registry Index Directory Matrix</h2>
                    <div class="max-h-[420px] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead><tr class="bg-slate-50 text-[10px] text-slate-400 font-bold border-b border-slate-100 sticky top-0"><th class="p-3 bg-slate-50">Admission Registry ID</th><th class="p-3 bg-slate-50">Legal Fullname Spec</th><th class="p-3 bg-slate-50 text-center">Class Block</th><th class="p-3 bg-slate-50">Attendance Matrix Profile</th></tr></thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                </div>`;
        }

        function renderFinancesLedger(mount) {
            let items = AppState.students.map(s => `
                <tr class="border-b text-xs border-slate-100 hover:bg-slate-50/50">
                    <td class="p-3 font-bold text-slate-900">${s.name} <span class="text-[10px] font-mono text-slate-400 block">${s.class} Split Code</span></td>
                    <td class="p-3 font-medium text-slate-500">₦${s.feesPaid.toLocaleString()}</td>
                    <td class="p-3 font-bold ${s.balance > 0 ? 'text-rose-600' : 'text-emerald-600'}">₦${s.balance.toLocaleString()}</td>
                    <td class="p-3">${s.balance > 0 ? `<button onclick="reconcile('${s.id}')" class="px-3 py-1 bg-emerald-600 text-white rounded-lg font-bold text-[10px] shadow-sm hover:bg-emerald-700 transition">Post Payment</button>` : `<span class="bg-emerald-50 text-emerald-800 border border-emerald-100 px-2 py-0.5 text-[10px] font-bold rounded">Cleared Balance</span>`}</td>
                </tr>`).join('');

            mount.innerHTML = `
                <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm animate-fade-in max-w-4xl">
                    <h2 class="font-bold text-sm mb-4 text-slate-900">Bursar Billing Ledger Balance Sheet</h2>
                    <div class="max-h-[400px] overflow-y-auto custom-scrollbar"><table class="w-full text-left border-collapse"><thead><tr class="bg-slate-50 text-[10px] text-slate-400 font-bold border-b border-slate-100 sticky top-0"><th class="p-3 bg-slate-50">Student Full Identity Profile</th><th class="p-3 bg-slate-50">Amount Deposited Paid</th><th class="p-3 bg-slate-50">Outstanding Deficit</th><th class="p-3 bg-slate-50">Transaction Action Execution</th></tr></thead><tbody>${items}</tbody></table></div>
                </div>`;
        }

        function reconcile(id) {
            let s = AppState.students.find(stud => stud.id === id);
            if(s) { s.feesPaid += s.balance; s.balance = 0; showToast(`Balanced account: ${s.name}`); persistToMemory(); renderFinancesLedger(document.getElementById('desktop-payload-mount')); }
        }

        function renderInventoryLedger(mount) {
            let items = AppState.inventory.map(i => `
                <tr class="border-b text-xs border-slate-100 hover:bg-slate-50/50">
                    <td class="p-3 font-mono text-slate-400 font-bold">${i.id}</td>
                    <td class="p-3 font-bold text-slate-900">${i.item}</td>
                    <td class="p-3 text-slate-500 font-medium">${i.category}</td>
                    <td class="p-3 font-bold">${i.stock} units</td>
                    <td class="p-3"><span class="px-2 py-0.5 text-[10px] font-extrabold rounded-md ${i.status==='Good'?'bg-emerald-50 text-emerald-800 border border-emerald-100':'bg-amber-50 text-amber-800 border border-amber-100'}">${i.status}</span></td>
                </tr>`).join('');

            mount.innerHTML = `
                <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm animate-fade-in max-w-4xl">
                    <h2 class="font-bold text-sm mb-4 text-slate-900">School Facility Stock Infrastructure Management Ledger</h2>
                    <table class="w-full text-left border-collapse"><thead><tr class="bg-slate-50 text-[10px] text-slate-400 font-bold border-b border-slate-100"><th class="p-3">Asset ID</th><th class="p-3">Resource Item Description</th><th class="p-3">Category Cluster</th><th class="p-3">Current Stock Level</th><th class="p-3">Status Assessment</th></tr></thead><tbody>${items}</tbody></table>
                </div>`;
        }

        function renderSysConfigView(mount) {
            mount.innerHTML = `
                <div class="bg-white border border-slate-200 p-6 rounded-xl shadow-sm text-xs max-w-md space-y-3 animate-fade-in">
                    <h2 class="font-bold text-sm text-slate-900">System Environment Configuration Blocks</h2>
                    <button onclick="localStorage.clear(); location.reload();" class="w-full py-2.5 text-center text-rose-600 bg-rose-50 rounded-xl font-bold">Factory Clear Sandbox Storage Engine Context</button>
                </div>`;
        }

        function renderProblemsGrid(mount) {
            let grids = AppState.problems.map(p => `
                <div class="p-3.5 bg-white border border-slate-100 rounded-xl text-xs space-y-1 shadow-sm">
                    <p class="font-bold text-slate-900">${p.text}</p>
                    <p class="text-emerald-900 bg-emerald-50 p-2 rounded-lg border border-emerald-100 font-medium text-[11px]"><i class="fa-solid fa-wand-magic-sparkles text-emerald-600 mr-1"></i> ${p.fix}</p>
                </div>`).join('');
            mount.innerHTML = `<div class="animate-fade-in space-y-4"><div class="flex justify-between items-center"><div><h2 class="text-sm font-bold text-slate-900">System Performance Integrity Audit Framework</h2></div><button onclick="toggleProblemView()" class="px-2.5 py-1 text-[11px] border rounded-lg bg-white font-bold">Close Audit</button></div><div class="${isMobileRole() ? 'space-y-3':'grid grid-cols-2 gap-4'}">${grids}</div></div>`;
        }
    </script>
</body>
</html>
